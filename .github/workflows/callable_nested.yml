
name: Nested callable reusable workflow

on:
  workflow_call:
    inputs:
      ref:
        description: 'Git reference - branch, tag, or commit SHA of this file in this repository to use by the caller'
        required: true
        type: string

env:
  # Put the repo owner and name this file is contained in here
  repository: etas-eng/vsps_infra_playground

jobs:
  run_nested_callable_workflow_steps:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      # - name: Check if repository already checked out
      #   id: repo-check
      #   shell: bash
      #   run: |
      #     repo_path=".github/.reuse/${{ env.repository }}/${{ inputs.ref }}"
      #     if [ -d "$repo_path" ]; then
      #       echo "exists=true" >> "$GITHUB_OUTPUT"
      #     else
      #       echo "exists=false" >> "$GITHUB_OUTPUT"
      #     fi

      - name: Checkout callable repository
        uses: actions/checkout@v6
        with:
          repository: ${{ env.repository }}
          ref: ${{ inputs.ref }}
          path: .github/.reuse/${{ env.repository }}/${{ inputs.ref }}

      # Cannot use this code as the "uses" must have a static value
      # - name: Call Reusable Action from this Repo
      #   uses: ./.github/.reuse/${{ env.repository }}/${{ inputs.ref }}/.github/actions/callable
      - name: Call Reusable Action from this Repo 'Workaround 4'
        uses: jenseng/dynamic-uses@v1.1.1
        with:
          uses: etas-eng/vsps_infra_playground/.github/actions/callable@${{ inputs.ref }}
          with: |
            ref: ${{ inputs.ref }}

      - name: Call script from the workflow repository
        shell: bash
        run: |
          echo "::group::  Call script from the workflow repository"

          # Call the script using relative path
          chmod +x ./.github/.reuse/${{ env.repository }}/${{ inputs.ref }}/.github/scripts/script.sh
          ./.github/.reuse/${{ env.repository }}/${{ inputs.ref }}/.github/scripts/script.sh

          echo "::endgroup::"

